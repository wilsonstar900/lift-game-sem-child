<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>升降機遊戲</title>
  <style>
    /* ─── Reset ─── */
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      font-family: -apple-system, 'PingFang HK', 'Helvetica Neue', Arial, sans-serif;
    }
    body {
      display: flex; flex-direction: column;
      height: 100dvh;
      background: #1a1a2e;
    }

    /* ══════════════════════════════════════════
       START SCREEN
    ══════════════════════════════════════════ */
    #start-screen {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #0d1b4b 0%, #1a1a2e 60%, #0d2b55 100%);
      z-index: 990;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      transition: opacity 0.4s;
    }
    #start-screen.hidden { opacity: 0; pointer-events: none; }
    #start-logo {
      font-size: 80px;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 8px 24px rgba(255,215,0,.3));
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    #start-title { font-size: 44px; font-weight: 900; color: #FFD700; text-shadow: 0 3px 16px rgba(255,215,0,.5); }
    #start-sub   { font-size: 22px; color: #90caf9; font-weight: 600; }
    #start-btn {
      margin-top: 16px; padding: 18px 64px;
      font-size: 30px; font-weight: 900;
      background: linear-gradient(135deg, #43a047, #2e7d32);
      color: #fff; border: none; border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(76,175,80,.55);
      touch-action: manipulation; transition: transform .1s;
    }
    #start-btn:active { transform: scale(.93); }

    /* ══════════════════════════════════════════
       INSTRUCTION BAR (landscape: full-width top strip)
    ══════════════════════════════════════════ */
    #instruction-bar {
      flex-shrink: 0;
      height: 66px;
      background: linear-gradient(135deg, #0d47a1, #1565c0);
      border-bottom: 3px solid #0a3880;
      display: flex; align-items: center;
      padding: 0 12px; gap: 10px;
    }
    #instruction-text {
      flex: 1;
      font-size: 26px; font-weight: 900;
      color: #FFD700; text-align: center;
    }
    #target-floor-badge {
      display: inline-flex; flex-direction: column; align-items: center;
      background: #FFD700; color: #0d47a1;
      padding: 2px 12px 4px; border-radius: 10px;
      margin: 0 6px; vertical-align: middle; line-height: 1.2;
    }
    #badge-label { font-size: 18px; font-weight: 900; }
    #badge-zh    { font-size: 12px; font-weight: 800; }
    #replay-btn {
      flex-shrink: 0; width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,.14); border: 2px solid rgba(255,255,255,.38);
      color: #fff; font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation; transition: background .15s;
    }
    #replay-btn:active { background: rgba(255,255,255,.3); }
    #settings-btn {
      flex-shrink: 0; width: 48px; height: 48px; border-radius: 12px;
      background: rgba(255,255,255,.1); border: 2px solid rgba(255,255,255,.25);
      color: #fff; font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation; transition: background .15s;
    }
    #settings-btn:active { background: rgba(255,255,255,.28); }

    /* ══════════════════════════════════════════
       MAIN GAME AREA — landscape flex row
    ══════════════════════════════════════════ */
    #elevator-main {
      flex: 1; min-height: 0;
      display: flex; flex-direction: row;
      overflow: hidden;
    }

    /* ══════════════════════════════════════════
       ELEVATOR VIEW — first-person, left side
    ══════════════════════════════════════════ */
    #elevator-view {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      position: relative;
      background: linear-gradient(
        to right,
        #1a2530 0%, #2c3e50 3%,
        #3d5166 50%,
        #2c3e50 97%, #1a2530 100%
      );
    }

    /* Ceiling strip */
    #ceiling {
      flex-shrink: 0; height: 48px;
      background: linear-gradient(to bottom, #1c2833, #2c3e50 40%, #495e6f);
      border-bottom: 3px solid #34495e;
      display: flex; align-items: flex-end; justify-content: center;
    }
    #ceiling-light {
      width: 38%; height: 14px;
      background: linear-gradient(to bottom, #fff9e6, #fffde7);
      border-radius: 0 0 8px 8px;
      box-shadow: 0 0 40px 14px rgba(255,253,231,.6), 0 0 80px 20px rgba(255,248,225,.25);
    }

    /* Floor indicator (LCD above door) */
    #floor-indicator {
      flex-shrink: 0; height: 54px;
      background: linear-gradient(to bottom, #1a2530, #263238);
      border-bottom: 3px solid #37474f;
      display: flex; align-items: center; justify-content: center; gap: 14px;
      box-shadow: inset 0 -4px 12px rgba(0,0,0,.4);
    }
    #floor-display {
      font-family: 'Courier New', monospace;
      font-size: 34px; font-weight: 900;
      color: #ff8c00; letter-spacing: 3px;
      min-width: 80px; text-align: center;
      text-shadow: 0 0 14px rgba(255,140,0,.9), 0 0 4px rgba(255,140,0,.6);
    }
    #direction-arrow {
      font-size: 24px; color: #ff8c00;
      opacity: 0; transition: opacity .2s;
      text-shadow: 0 0 10px rgba(255,140,0,.7);
      min-width: 26px; text-align: center;
    }
    #direction-arrow.vis { opacity: 1; }

    /* Door frame */
    #door-frame {
      flex: 1; min-height: 0;
      position: relative;
      margin: 12px 44px 12px 44px;
      border-radius: 6px 6px 0 0;
      overflow: hidden;
      box-shadow:
        0 0 0 6px #1c2833,
        0 0 0 9px #37474f,
        inset 0 0 20px rgba(0,0,0,.5);
    }

    /* Outside corridor scene */
    #door-outside {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to bottom, #e3f2fd, #bbdefb 40%, #e8eaf6 70%, #c5cae9);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
    }
    #outside-floor-num {
      font-size: 110px; font-weight: 900;
      color: #1a237e;
      text-shadow: 0 4px 16px rgba(26,35,126,.3);
      line-height: 1;
    }
    #outside-floor-label {
      font-size: 22px; font-weight: 700;
      color: #3949ab; letter-spacing: 2px;
    }
    #door-outside::before {
      content: ''; position: absolute;
      bottom: 0; left: 0; right: 0; height: 28%;
      background: linear-gradient(to bottom, transparent, rgba(26,35,126,.08));
    }

    /* Elevator doors */
    #door-left, #door-right {
      position: absolute; top: 0; bottom: 0; width: 50%; z-index: 10;
      background: linear-gradient(90deg,
        #546e7a 0%, #78909c 15%,
        #b0bec5 35%, #cfd8dc 50%,
        #b0bec5 65%, #78909c 85%,
        #546e7a 100%);
      transition: transform 0.65s ease-in-out;
      will-change: transform;
    }
    #door-left  { left: 0;  border-right: 3px solid #37474f; }
    #door-right { right: 0; border-left:  3px solid #37474f; }
    #door-left::after {
      content: ''; position: absolute;
      right: 10px; top: 50%; transform: translateY(-50%);
      width: 5px; height: 32px;
      background: linear-gradient(to right, #37474f, #607d8b, #37474f);
      border-radius: 3px; box-shadow: 0 2px 6px rgba(0,0,0,.5);
    }
    #door-right::after {
      content: ''; position: absolute;
      left: 10px; top: 50%; transform: translateY(-50%);
      width: 5px; height: 32px;
      background: linear-gradient(to right, #37474f, #607d8b, #37474f);
      border-radius: 3px; box-shadow: 0 2px 6px rgba(0,0,0,.5);
    }
    #door-left::before, #door-right::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0, transparent 48px,
        rgba(0,0,0,.07) 48px, rgba(0,0,0,.07) 50px
      );
    }
    /* Slide out of frame when open */
    #door-frame.doors-open #door-left  { transform: translateX(-100%); }
    #door-frame.doors-open #door-right { transform: translateX(100%); }

    /* Floor strip (bottom) */
    #floor-strip {
      flex-shrink: 0; height: 46px;
      background: linear-gradient(to bottom, #3d5166, #2c3e50, #1c2833);
      border-top: 3px solid #37474f;
      overflow: hidden;
    }
    #floor-strip::before {
      content: ''; display: block; width: 100%; height: 100%;
      background: repeating-linear-gradient(
        90deg, transparent 0, transparent 80px,
        rgba(255,255,255,.04) 80px, rgba(255,255,255,.04) 82px
      );
    }

    /* Travel shake */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-2px); }
      75%      { transform: translateX(2px); }
    }
    #elevator-view.moving { animation: shake .18s ease-in-out infinite; }

    /* ══════════════════════════════════════════
       BUTTON PANEL — right side
    ══════════════════════════════════════════ */
    #panel-section {
      width: 258px; flex-shrink: 0;
      background: linear-gradient(to left, #1a2530, #2c3e50 15%, #2d3e50);
      border-left: 3px solid #37474f;
      display: flex; flex-direction: column;
      padding: 10px 10px 10px 12px; gap: 8px;
      overflow: hidden;
    }
    #panel-bezel {
      flex: 1; min-height: 0;
      background: linear-gradient(160deg, #263238, #1c2833);
      border: 3px solid #455a64; border-radius: 14px;
      padding: 10px 10px 10px;
      display: flex; flex-direction: column; gap: 8px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,.6);
    }
    #panel-label {
      text-align: center; font-size: 11px; font-weight: 700;
      color: #546e7a; letter-spacing: 2px; text-transform: uppercase;
    }

    /* Floor buttons — numbers only, 2-col grid */
    #floor-buttons {
      flex: 1; min-height: 0;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 7px;
      align-content: space-between;
    }
    .floor-btn {
      aspect-ratio: 1; border-radius: 50%;
      background: radial-gradient(circle at 38% 34%, #f0f0f0, #d0d0d0 50%, #8a8a8a);
      border: 3px solid #616161;
      box-shadow: 3px 3px 10px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.6), inset 0 -1px 0 rgba(0,0,0,.2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: #1a1a1a;
      transition: transform .1s, box-shadow .1s;
      touch-action: manipulation;
      user-select: none; -webkit-user-select: none;
    }
    .floor-btn[data-id="G"] { font-size: 24px; color: #0d47a1; }
    .floor-btn:active {
      transform: scale(.88);
      box-shadow: 1px 1px 4px rgba(0,0,0,.6), inset 0 3px 6px rgba(0,0,0,.35);
    }
    .floor-btn.lit {
      background: radial-gradient(circle at 38% 34%, #fff9e0, #ffd54f 50%, #ff8f00);
      border-color: #ff8f00;
      box-shadow: 0 0 18px rgba(255,143,0,.9), 3px 3px 10px rgba(0,0,0,.5);
      color: #4a2600;
    }
    .floor-btn.hint { animation: hint-pulse .45s ease-in-out infinite alternate; }
    @keyframes hint-pulse {
      from { background: radial-gradient(circle at 38% 34%, #e8f5e9, #66bb6a 50%, #2e7d32); border-color: #4caf50; box-shadow: 0 0 10px rgba(76,175,80,.5), 3px 3px 10px rgba(0,0,0,.5); }
      to   { background: radial-gradient(circle at 38% 34%, #f1f8e9, #9ccc65 50%, #558b2f); border-color: #8bc34a; box-shadow: 0 0 28px rgba(76,175,80,.95), 3px 3px 10px rgba(0,0,0,.5); }
    }
    .floor-btn.disabled { pointer-events: none; opacity: .45; }

    /* Door control buttons — FUNCTIONAL */
    #door-ctrls { flex-shrink: 0; display: flex; gap: 8px; }
    .door-ctrl {
      flex: 1; height: 46px;
      background: #37474f; border: 2px solid #546e7a;
      border-radius: 10px; color: #cfd8dc;
      font-size: 18px; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1px;
      touch-action: manipulation; transition: background .15s, border-color .15s, color .15s;
    }
    .door-ctrl span { font-size: 9px; color: #90a4ae; font-weight: 700; letter-spacing: 1px; transition: color .15s; }
    .door-ctrl:active { background: #546e7a; }
    /* Active/lit state for open button when doors are open */
    .door-ctrl.door-active {
      background: #0d47a1; border-color: #42a5f5; color: #fff;
    }
    .door-ctrl.door-active span { color: #90caf9; }

    /* Auto-close countdown bar */
    #autoclose-bar {
      height: 4px; background: #1c2833; border-radius: 2px; overflow: hidden;
      flex-shrink: 0;
    }
    #autoclose-fill {
      height: 100%; width: 0%;
      background: linear-gradient(to right, #42a5f5, #1565c0);
      transition: width .1s linear;
      border-radius: 2px;
    }

    /* ══════════════════════════════════════════
       SETTINGS DRAWER (side popup from right)
    ══════════════════════════════════════════ */
    #settings-overlay {
      position: fixed; inset: 0; z-index: 700;
      background: rgba(0,0,0,0);
      pointer-events: none;
      transition: background .3s;
    }
    #settings-overlay.open {
      background: rgba(0,0,0,.5);
      pointer-events: auto;
    }
    #settings-drawer {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: 300px;
      background: linear-gradient(160deg, #1e2d3d, #162232);
      border-left: 3px solid #37474f;
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
      box-shadow: -8px 0 32px rgba(0,0,0,.6);
    }
    #settings-overlay.open #settings-drawer { transform: translateX(0); }

    #settings-header {
      height: 66px; flex-shrink: 0;
      background: linear-gradient(135deg, #0d47a1, #1565c0);
      border-bottom: 3px solid #0a3880;
      display: flex; align-items: center; padding: 0 16px; gap: 12px;
    }
    #settings-title { font-size: 20px; font-weight: 900; color: #FFD700; flex: 1; }
    #settings-close {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,.14); border: 2px solid rgba(255,255,255,.3);
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation; transition: background .15s;
    }
    #settings-close:active { background: rgba(255,255,255,.3); }

    #settings-body {
      flex: 1; padding: 24px 20px;
      display: flex; flex-direction: column; gap: 14px; overflow-y: auto;
    }
    .setting-section-label {
      font-size: 11px; color: #546e7a; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; padding: 0 2px;
    }
    .setting-divider { height: 1px; background: rgba(255,255,255,.1); }
    .setting-btn {
      width: 100%; padding: 16px 18px;
      border: none; border-radius: 14px;
      color: #fff; font-size: 17px; font-weight: 700;
      cursor: pointer; touch-action: manipulation;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
      transition: transform .1s, opacity .15s;
    }
    .setting-btn:active { transform: scale(.96); }
    .setting-btn .btn-icon { font-size: 22px; }
    #btn-refresh { background: linear-gradient(135deg, #c62828, #b71c1c); }

    /* ══════════════════════════════════════════
       CELEBRATION
    ══════════════════════════════════════════ */
    #celebration-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55); z-index: 800;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .28s;
    }
    #celebration-overlay.show { opacity: 1; pointer-events: auto; }
    #celebration-card {
      background: #fff; border-radius: 28px;
      padding: 32px 52px; text-align: center;
      border: 7px solid #FFD700;
      box-shadow: 0 24px 64px rgba(0,0,0,.45);
      transform: scale(0);
    }
    #celebration-overlay.show #celebration-card {
      animation: cel-bounce .38s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    @keyframes cel-bounce {
      0%   { transform: scale(.35); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }
    #cel-emoji { font-size: 64px; display: block; margin-bottom: 8px; }
    #cel-main  { font-size: 40px; font-weight: 900; color: #0d47a1; }
    #cel-sub   { font-size: 26px; font-weight: 700; color: #1565c0; margin-top: 4px; }

    /* ─── Confetti ─── */
    .confetti {
      position: fixed; border-radius: 2px;
      pointer-events: none; z-index: 790;
      animation: cf-fall var(--dur,2s) ease-in var(--delay,0s) forwards;
    }
    @keyframes cf-fall {
      0%   { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) translateX(var(--drift,0px)) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- ─── Start Screen ─── -->
  <div id="start-screen">
    <div id="start-logo">🏢</div>
    <div id="start-title">升降機遊戲</div>
    <div id="start-sub">學習香港樓層</div>
    <button id="start-btn">開始玩 ▶</button>
  </div>

  <!-- ─── Instruction Bar (top) ─── -->
  <div id="instruction-bar">
    <button id="replay-btn" aria-label="重播">🔊</button>
    <div id="instruction-text">
      請去
      <span id="target-floor-badge">
        <span id="badge-label">?</span>
        <span id="badge-zh">?</span>
      </span>
    </div>
    <button id="settings-btn" aria-label="設定">⚙️</button>
  </div>

  <!-- ─── Main Game Area (landscape row) ─── -->
  <div id="elevator-main">

    <!-- Elevator first-person view -->
    <div id="elevator-view">

      <div id="ceiling"><div id="ceiling-light"></div></div>

      <div id="floor-indicator">
        <div id="floor-display">G/F</div>
        <div id="direction-arrow">▲</div>
      </div>

      <div id="door-frame">
        <div id="door-outside">
          <div id="outside-floor-num">G</div>
          <div id="outside-floor-label">地下</div>
        </div>
        <div id="door-left"></div>
        <div id="door-right"></div>
      </div>

      <div id="floor-strip"></div>
    </div>

    <!-- Button panel (right) -->
    <div id="panel-section">
      <div id="panel-bezel">
        <div id="panel-label">選樓層</div>
        <div id="floor-buttons"><!-- built by JS --></div>
        <!-- Auto-close countdown bar -->
        <div id="autoclose-bar"><div id="autoclose-fill"></div></div>
        <!-- Functional door controls -->
        <div id="door-ctrls">
          <button class="door-ctrl" id="btn-door-open">◁▷<span>開門</span></button>
          <button class="door-ctrl" id="btn-door-close">▷◁<span>關門</span></button>
        </div>
      </div>
    </div>

  </div><!-- #elevator-main -->

  <!-- ─── Settings Drawer ─── -->
  <div id="settings-overlay">
    <div id="settings-drawer">
      <div id="settings-header">
        <div id="settings-title">⚙️ 設定</div>
        <button id="settings-close">✕</button>
      </div>
      <div id="settings-body">
        <div class="setting-section-label">系統</div>
        <div class="setting-divider"></div>
        <button class="setting-btn" id="btn-refresh">
          <span class="btn-icon">🔄</span>
          強制重新整理
        </button>
      </div>
    </div>
  </div>

  <!-- ─── Celebration Overlay ─── -->
  <div id="celebration-overlay">
    <div id="celebration-card">
      <span id="cel-emoji">🎉</span>
      <div id="cel-main">答啱喇！</div>
      <div id="cel-sub"></div>
    </div>
  </div>

<script>
/* ══════════════════════════════════════════
   FLOOR DATA — HK format, no 4/F
══════════════════════════════════════════ */
const FLOORS = [
  { id:'G',  label:'G/F',  btnNum:'G',  display:'地下', speech:'地下',  position:0 },
  { id:'1',  label:'1/F',  btnNum:'1',  display:'一樓', speech:'一樓',  position:1 },
  { id:'2',  label:'2/F',  btnNum:'2',  display:'二樓', speech:'二樓',  position:2 },
  { id:'3',  label:'3/F',  btnNum:'3',  display:'三樓', speech:'三樓',  position:3 },
  { id:'5',  label:'5/F',  btnNum:'5',  display:'五樓', speech:'五樓',  position:4 },
  { id:'6',  label:'6/F',  btnNum:'6',  display:'六樓', speech:'六樓',  position:5 },
  { id:'7',  label:'7/F',  btnNum:'7',  display:'七樓', speech:'七樓',  position:6 },
  { id:'8',  label:'8/F',  btnNum:'8',  display:'八樓', speech:'八樓',  position:7 },
  { id:'9',  label:'9/F',  btnNum:'9',  display:'九樓', speech:'九樓',  position:8 },
  { id:'10', label:'10/F', btnNum:'10', display:'十樓', speech:'十樓',  position:9 },
];
// No 4/F — 粵語「四」諧音「死」

/* ══════════════════════════════════════════
   GAME STATE
══════════════════════════════════════════ */
const S = {
  IDLE:'idle', ANNOUNCING:'announcing', WAITING:'waiting',
  MOVING:'moving', DOOR_OPEN:'door_open', CELEBRATING:'celebrating', HINT:'hint',
};
let state       = S.IDLE;
let curFloor    = FLOORS[0];
let targetFloor = null;
let wrongCount  = 0;
let hintTimer   = null;

/* ══════════════════════════════════════════
   DOOR STATE
   doorSt: 'closed' | 'opening' | 'open' | 'closing'
   waitingForClose: true when doors are open post-celebration
     and we're waiting for close button or auto-close
══════════════════════════════════════════ */
let doorSt          = 'closed';
let doorAutoTimer   = null;    // auto-close setTimeout handle
let acInterval      = null;    // countdown bar interval
let waitingForClose = false;
let afterCloseFn    = null;    // callback to run when doors close post-celebration

/* ══════════════════════════════════════════
   DOM
══════════════════════════════════════════ */
const $display       = document.getElementById('floor-display');
const $arrow         = document.getElementById('direction-arrow');
const $doorFrame     = document.getElementById('door-frame');
const $buttons       = document.getElementById('floor-buttons');
const $celOv         = document.getElementById('celebration-overlay');
const $celSub        = document.getElementById('cel-sub');
const $celEmoji      = document.getElementById('cel-emoji');
const $badgeLbl      = document.getElementById('badge-label');
const $badgeZh       = document.getElementById('badge-zh');
const $replay        = document.getElementById('replay-btn');
const $startScr      = document.getElementById('start-screen');
const $startBtn      = document.getElementById('start-btn');
const $outsideNum    = document.getElementById('outside-floor-num');
const $outsideLbl    = document.getElementById('outside-floor-label');
const $elevView      = document.getElementById('elevator-view');
const $settingsBtn   = document.getElementById('settings-btn');
const $settingsOv    = document.getElementById('settings-overlay');
const $settingsClose = document.getElementById('settings-close');
const $btnDoorOpen   = document.getElementById('btn-door-open');
const $btnDoorClose  = document.getElementById('btn-door-close');
const $btnRefresh    = document.getElementById('btn-refresh');
const $acFill        = document.getElementById('autoclose-fill');

/* ══════════════════════════════════════════
   TTS — Cantonese zh-HK
══════════════════════════════════════════ */
function speak(text, onEnd) {
  if (!window.speechSynthesis) { onEnd?.(); return; }
  speechSynthesis.cancel();
  setTimeout(() => {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'zh-HK'; utt.rate = 0.80; utt.pitch = 1.05; utt.volume = 1;
    if (onEnd) utt.onend = () => onEnd();
    speechSynthesis.speak(utt);
  }, 110);
}

/* ══════════════════════════════════════════
   LCD + SCENE
══════════════════════════════════════════ */
function setDisplay(label) { $display.textContent = label; }
function setArrow(dir) {
  if (dir === 'none') { $arrow.classList.remove('vis'); return; }
  $arrow.textContent = dir === 'up' ? '▲' : '▼';
  $arrow.classList.add('vis');
}
function setOutsideScene(floor) {
  $outsideNum.textContent = floor.btnNum;
  $outsideLbl.textContent = floor.display;
}

/* ══════════════════════════════════════════
   ELEVATOR MOVEMENT
══════════════════════════════════════════ */
function moveElevator(toFloor, done) {
  state = S.MOVING;
  const fromPos = curFloor.position;
  const toPos   = toFloor.position;
  const steps   = Math.abs(toPos - fromPos);
  const dur     = Math.max(900, steps * 380);

  speak(toPos > fromPos ? '往上' : '往下');
  setArrow(toPos > fromPos ? 'up' : 'down');
  rollDisplay(fromPos, toPos, dur);
  $elevView.classList.add('moving');

  setTimeout(() => {
    $elevView.classList.remove('moving');
    curFloor = toFloor;
    setArrow('none');
    setOutsideScene(toFloor);
    done?.();
  }, dur);
}

function rollDisplay(from, to, totalMs) {
  if (from === to) return;
  const dir = from < to ? 1 : -1;
  const steps = Math.abs(to - from);
  const ms = totalMs / steps;
  let i = 1;
  const iv = setInterval(() => {
    const pos = from + dir * i;
    const f = FLOORS.find(x => x.position === pos);
    if (f) setDisplay(f.label);
    i++;
    if (i > steps) clearInterval(iv);
  }, ms);
}

/* ══════════════════════════════════════════
   DOORS
   openDoors  — animate open + announce
   closeDoors — animate close + announce
   beginWaitForClose — start 3-sec auto-close countdown
                       user can close early or reopen
══════════════════════════════════════════ */
function openDoors(cb) {
  clearTimeout(doorAutoTimer);
  clearInterval(acInterval);
  $acFill.style.width = '0%';

  speak('升降機門開啟');
  $doorFrame.classList.add('doors-open');
  doorSt = 'opening';
  state  = S.DOOR_OPEN;

  setTimeout(() => {
    doorSt = 'open';
    updateDoorBtnState();
    cb?.();
  }, 680);
}

function closeDoors(cb) {
  clearTimeout(doorAutoTimer);
  clearInterval(acInterval);
  $acFill.style.width = '0%';
  waitingForClose = false;
  afterCloseFn    = null;

  speak('升降機門關閉');
  $doorFrame.classList.remove('doors-open');
  doorSt = 'closing';
  updateDoorBtnState();

  setTimeout(() => {
    doorSt = 'closed';
    updateDoorBtnState();
    cb?.();
  }, 680);
}

const AUTO_CLOSE_MS = 3000;

function beginWaitForClose(onClosed) {
  afterCloseFn    = onClosed;
  waitingForClose = true;
  startAutoCloseCountdown();
}

function startAutoCloseCountdown() {
  clearTimeout(doorAutoTimer);
  clearInterval(acInterval);

  // Animate the progress bar from 0→100% over AUTO_CLOSE_MS
  const start = Date.now();
  $acFill.style.width = '0%';
  acInterval = setInterval(() => {
    const pct = Math.min(100, ((Date.now() - start) / AUTO_CLOSE_MS) * 100);
    $acFill.style.width = pct + '%';
    if (pct >= 100) clearInterval(acInterval);
  }, 50);

  doorAutoTimer = setTimeout(() => {
    if (waitingForClose) closeDoors(afterCloseFn);
  }, AUTO_CLOSE_MS);
}

/* Visual state for door buttons */
function updateDoorBtnState() {
  const isOpen = doorSt === 'open' || doorSt === 'opening';
  $btnDoorOpen.classList.toggle('door-active', isOpen && waitingForClose);
}

/* ── Door Open button ── */
$btnDoorOpen.addEventListener('click', () => {
  if (!waitingForClose) return;

  if (doorSt === 'closed' || doorSt === 'closing') {
    // Re-open the doors and restart auto-close
    speak('升降機門開啟');
    $doorFrame.classList.add('doors-open');
    doorSt = 'opening';
    clearTimeout(doorAutoTimer);
    clearInterval(acInterval);
    $acFill.style.width = '0%';
    setTimeout(() => {
      doorSt = 'open';
      updateDoorBtnState();
      startAutoCloseCountdown();  // restart 3-sec
    }, 680);
  } else {
    // Already open — just restart the countdown
    startAutoCloseCountdown();
  }
});

/* ── Door Close button ── */
$btnDoorClose.addEventListener('click', () => {
  if (!waitingForClose) return;
  if (doorSt === 'closed' || doorSt === 'closing') return;
  const cb = afterCloseFn;
  closeDoors(cb);
});

/* ══════════════════════════════════════════
   FLOOR BUTTONS
══════════════════════════════════════════ */
function buildButtons() {
  [...FLOORS].reverse().forEach(f => {
    const btn = document.createElement('button');
    btn.className   = 'floor-btn';
    btn.dataset.id  = f.id;
    btn.textContent = f.btnNum;   // NUMBER ONLY
    btn.addEventListener('click', () => onFloorBtn(f));
    $buttons.appendChild(btn);
  });
}

function setButtonsDisabled(yes) {
  document.querySelectorAll('.floor-btn')
    .forEach(b => b.classList.toggle('disabled', yes));
}
function resetButtons() {
  document.querySelectorAll('.floor-btn')
    .forEach(b => b.classList.remove('lit', 'hint', 'disabled'));
}

/* ══════════════════════════════════════════
   HINT
══════════════════════════════════════════ */
function showHint() {
  clearTimeout(hintTimer);
  const btn = document.querySelector(`.floor-btn[data-id="${targetFloor.id}"]`);
  if (!btn) return;
  btn.classList.add('hint');
  hintTimer = setTimeout(() => btn.classList.remove('hint'), 4000);
}

/* ══════════════════════════════════════════
   CELEBRATE
══════════════════════════════════════════ */
const EMOJIS    = ['🎉','🎊','⭐','🌟','🏆','🎈','✨','🥳'];
const CF_COLORS = ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#ff8c00','#e91e63','#7c4dff'];

function celebrate(floor) {
  state = S.CELEBRATING;
  fireConfetti(30);
  $celEmoji.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  $celSub.textContent   = `去${floor.display}！`;
  $celOv.classList.add('show');
  speak(`答啱喇！去${floor.speech}！`);

  // Hide card after 2.7 s, then wait for door close (manual or auto)
  setTimeout(() => {
    $celOv.classList.remove('show');
    clearConfetti();
    // Doors are still open — begin 3-sec wait for close
    beginWaitForClose(() => {
      updateDoorBtnState();
      setTimeout(() => startRound(), 800);
    });
  }, 2700);
}

function fireConfetti(n) {
  for (let i = 0; i < n; i++) {
    const el   = document.createElement('div');
    const size = 8 + Math.random() * 10;
    el.className   = 'confetti';
    el.style.cssText = [
      `width:${size}px`, `height:${size}px`,
      `left:${Math.random()*100}vw`, `top:-20px`,
      `background:${CF_COLORS[Math.floor(Math.random()*CF_COLORS.length)]}`,
      `border-radius:${Math.random()>.45?'50%':'2px'}`,
      `--dur:${1.4+Math.random()*1.0}s`,
      `--delay:${Math.random()*.65}s`,
      `--drift:${(Math.random()-.5)*260}px`,
    ].join(';');
    document.body.appendChild(el);
  }
}
function clearConfetti() { document.querySelectorAll('.confetti').forEach(e=>e.remove()); }

/* ══════════════════════════════════════════
   BUTTON HANDLER
══════════════════════════════════════════ */
function onFloorBtn(floor) {
  if (state !== S.WAITING) return;
  if (floor.id === curFloor.id) return;

  const btn = document.querySelector(`.floor-btn[data-id="${floor.id}"]`);

  if (floor.id === targetFloor.id) {
    // ✅ Correct!
    btn.classList.add('lit');
    setButtonsDisabled(true);
    moveElevator(targetFloor, () => {
      speak(`到達${targetFloor.speech}`, () => {
        openDoors(() => celebrate(targetFloor));
      });
    });
  } else {
    // ❌ Wrong — gentle feedback
    state = S.HINT;
    wrongCount++;
    btn.classList.add('lit');
    const msg = wrongCount === 1 ? '唔係呀，再試下' : '唔係呀，試下另一個';
    speak(msg);
    setTimeout(() => {
      btn.classList.remove('lit');
      if (wrongCount >= 2) showHint();
      state = S.WAITING;
    }, 1700);
  }
}

/* ══════════════════════════════════════════
   ROUND CONTROL
══════════════════════════════════════════ */
function startRound() {
  state           = S.ANNOUNCING;
  wrongCount      = 0;
  doorSt          = 'closed';
  waitingForClose = false;
  afterCloseFn    = null;
  clearTimeout(hintTimer);
  clearTimeout(doorAutoTimer);
  clearInterval(acInterval);
  $acFill.style.width = '0%';
  updateDoorBtnState();

  let pick;
  do { pick = FLOORS[Math.floor(Math.random() * FLOORS.length)]; }
  while (pick.id === curFloor.id);
  targetFloor = pick;

  $badgeLbl.textContent = targetFloor.label;
  $badgeZh.textContent  = targetFloor.display;
  resetButtons();
  speak(`請去${targetFloor.speech}`, () => { state = S.WAITING; });
}

/* ══════════════════════════════════════════
   REPLAY
══════════════════════════════════════════ */
$replay.addEventListener('click', () => {
  if (state === S.WAITING || state === S.HINT)
    speak(`請去${targetFloor.speech}`);
});

/* ══════════════════════════════════════════
   SETTINGS
══════════════════════════════════════════ */
$settingsBtn.addEventListener('click', () => $settingsOv.classList.add('open'));
$settingsClose.addEventListener('click', () => $settingsOv.classList.remove('open'));
// Tap backdrop to close
$settingsOv.addEventListener('click', e => {
  if (e.target === $settingsOv) $settingsOv.classList.remove('open');
});
// Force refresh
$btnRefresh.addEventListener('click', () => {
  location.reload(true);
});

/* ══════════════════════════════════════════
   START
══════════════════════════════════════════ */
$startBtn.addEventListener('click', () => {
  // Unlock iOS audio with silent utterance on gesture
  const unlock = new SpeechSynthesisUtterance(' ');
  unlock.volume = 0;
  speechSynthesis.speak(unlock);

  $startScr.classList.add('hidden');
  setTimeout(() => {
    $startScr.style.display = 'none';
    setOutsideScene(curFloor);
    startRound();
  }, 440);
});

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
buildButtons();
setDisplay(curFloor.label);
setOutsideScene(curFloor);
</script>
</body>
</html>
