<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>升降機遊戲</title>
  <style>
    /* ─── Reset ──────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      font-family: -apple-system, 'PingFang HK', 'Helvetica Neue', Arial, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      background: #1a1a2e;
    }

    /* ─── Start Screen ───────────────────────────────────── */
    #start-screen {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #0d1b4b 0%, #1a1a2e 60%, #0d2b55 100%);
      z-index: 990;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
      transition: opacity 0.45s ease;
    }
    #start-screen.hidden { opacity: 0; pointer-events: none; }
    #start-logo {
      font-size: 100px;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 8px 24px rgba(255,215,0,0.3));
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    #start-title {
      font-size: 52px; font-weight: 900;
      color: #FFD700;
      text-shadow: 0 3px 16px rgba(255,215,0,0.5);
      letter-spacing: 2px;
    }
    #start-sub { font-size: 26px; color: #90caf9; font-weight: 600; }
    #start-btn {
      margin-top: 24px;
      padding: 22px 72px;
      font-size: 34px; font-weight: 900;
      background: linear-gradient(135deg, #43a047 0%, #2e7d32 100%);
      color: #fff; border: none; border-radius: 70px;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(76,175,80,0.55), 0 2px 0 rgba(0,0,0,0.2);
      touch-action: manipulation;
      transition: transform 0.1s;
    }
    #start-btn:active { transform: scale(0.93); }

    /* ─── Instruction Bar ────────────────────────────────── */
    #instruction-bar {
      flex-shrink: 0;
      height: 86px;
      background: linear-gradient(135deg, #0d47a1 0%, #1565c0 100%);
      border-bottom: 3px solid #0a3880;
      display: flex; align-items: center;
      justify-content: center; gap: 12px;
      padding: 0 16px;
      position: relative; z-index: 10;
    }
    #instruction-text {
      font-size: 28px; font-weight: 900;
      color: #FFD700; flex: 1; text-align: center;
    }
    #target-floor-badge {
      display: inline-flex; flex-direction: column; align-items: center;
      background: #FFD700; color: #0d47a1;
      padding: 2px 14px 4px; border-radius: 12px;
      margin: 0 6px; vertical-align: middle; line-height: 1.2;
    }
    #badge-label { font-size: 20px; font-weight: 900; }
    #badge-zh    { font-size: 13px; font-weight: 800; }
    #replay-btn {
      flex-shrink: 0; width: 56px; height: 56px; border-radius: 50%;
      background: rgba(255,255,255,0.14);
      border: 2px solid rgba(255,255,255,0.38);
      color: #fff; font-size: 24px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation; transition: background 0.15s;
    }
    #replay-btn:active { background: rgba(255,255,255,0.3); }

    /* ═══════════════════════════════════════════════════════
       ELEVATOR INTERIOR — First-Person View
    ═══════════════════════════════════════════════════════ */
    #elevator-interior {
      flex: 1;
      display: flex; flex-direction: column;
      overflow: hidden; min-height: 0;
      position: relative;
    }

    /* ── Ceiling ──────────────────────────────────────────── */
    #ceiling {
      flex-shrink: 0;
      height: 62px;
      background: linear-gradient(to bottom,
        #1c2833 0%, #2c3e50 40%, #495e6f 100%);
      display: flex; align-items: flex-end;
      justify-content: center; padding-bottom: 0;
      position: relative;
      border-bottom: 3px solid #34495e;
    }
    #ceiling-light {
      width: 55%; height: 18px;
      background: linear-gradient(to bottom,
        #fff9e6 0%, #fffde7 60%, #fff8e1 100%);
      border-radius: 0 0 8px 8px;
      box-shadow:
        0 0 40px 14px rgba(255,253,231,0.65),
        0 0 80px 20px rgba(255,248,225,0.3);
    }
    /* Ceiling corner details */
    #ceiling::before, #ceiling::after {
      content: '';
      position: absolute; bottom: 0;
      width: 18px; height: 100%;
      background: linear-gradient(to right, #1a2530, #2c3e50);
    }
    #ceiling::before { left: 0; }
    #ceiling::after  { right: 0; transform: scaleX(-1); }

    /* ── Main Interior Area ───────────────────────────────── */
    #interior-main {
      flex: 1; min-height: 0;
      display: flex; flex-direction: row;
      position: relative;
    }

    /* Left side wall */
    #wall-left {
      width: 28px; flex-shrink: 0;
      background: linear-gradient(to right,
        #1a2530 0%, #2c3e50 60%, #3d5166 100%);
      border-right: 2px solid #4a6278;
    }

    /* ── Door Section (center) ────────────────────────────── */
    #door-section {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      background: linear-gradient(to bottom,
        #3d5166 0%, #4a6278 20%, #3d5166 100%);
      position: relative;
    }

    /* Floor indicator above doors */
    #floor-indicator {
      flex-shrink: 0;
      height: 64px;
      background: linear-gradient(to bottom, #1a2530 0%, #263238 100%);
      border-bottom: 3px solid #37474f;
      display: flex; align-items: center;
      justify-content: center; gap: 16px;
      box-shadow: inset 0 -4px 12px rgba(0,0,0,0.4);
    }
    #floor-display {
      font-family: 'Courier New', monospace;
      font-size: 40px; font-weight: 900;
      color: #ff8c00; letter-spacing: 3px;
      min-width: 90px; text-align: center;
      text-shadow: 0 0 14px rgba(255,140,0,0.9), 0 0 4px rgba(255,140,0,0.6);
    }
    #direction-arrow {
      font-size: 28px; color: #ff8c00;
      opacity: 0; transition: opacity 0.2s;
      text-shadow: 0 0 10px rgba(255,140,0,0.7);
      min-width: 30px; text-align: center;
    }
    #direction-arrow.vis { opacity: 1; }

    /* Door frame (the opening) */
    #door-frame {
      flex: 1; min-height: 0;
      position: relative;
      margin: 16px 28px 16px 28px;
      border-radius: 6px 6px 0 0;
      overflow: hidden;
      box-shadow:
        0 0 0 6px #1c2833,
        0 0 0 9px #37474f,
        inset 0 0 20px rgba(0,0,0,0.5);
    }

    /* Outside scene (visible behind open doors) */
    #door-outside {
      position: absolute; inset: 0;
      z-index: 1;
      background: linear-gradient(to bottom,
        #e3f2fd 0%, #bbdefb 40%, #e8eaf6 70%, #c5cae9 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px;
    }
    #outside-floor-num {
      font-size: 88px; font-weight: 900;
      color: #1a237e;
      text-shadow: 0 4px 16px rgba(26,35,126,0.3);
      line-height: 1;
    }
    #outside-floor-label {
      font-size: 24px; font-weight: 700;
      color: #3949ab; letter-spacing: 2px;
    }
    /* Corridor lines */
    #door-outside::before {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 30%;
      background: linear-gradient(to bottom,
        transparent, rgba(26,35,126,0.08));
    }

    /* Elevator doors */
    #door-left, #door-right {
      position: absolute; top: 0; bottom: 0;
      width: 50%; z-index: 10;
      background: linear-gradient(90deg,
        #546e7a 0%, #78909c 15%,
        #b0bec5 35%, #cfd8dc 50%,
        #b0bec5 65%, #78909c 85%,
        #546e7a 100%);
      transition: transform 0.65s ease-in-out;
      will-change: transform;
    }
    #door-left  { left: 0;  border-right: 3px solid #37474f; }
    #door-right { right: 0; border-left:  3px solid #37474f; }
    /* Door handle */
    #door-left::after {
      content: '';
      position: absolute;
      right: 10px; top: 50%; transform: translateY(-50%);
      width: 5px; height: 32px;
      background: linear-gradient(to right, #37474f, #607d8b, #37474f);
      border-radius: 3px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    #door-right::after {
      content: '';
      position: absolute;
      left: 10px; top: 50%; transform: translateY(-50%);
      width: 5px; height: 32px;
      background: linear-gradient(to right, #37474f, #607d8b, #37474f);
      border-radius: 3px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    /* Door horizontal lines (panel detail) */
    #door-left::before, #door-right::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0, transparent 48px,
        rgba(0,0,0,0.07) 48px, rgba(0,0,0,0.07) 50px
      );
    }
    /* Open state — slide out of frame */
    #door-frame.doors-open #door-left  { transform: translateX(-100%); }
    #door-frame.doors-open #door-right { transform: translateX(100%); }

    /* Right side wall */
    #wall-right {
      width: 28px; flex-shrink: 0;
      background: linear-gradient(to left,
        #1a2530 0%, #2c3e50 60%, #3d5166 100%);
      border-left: 2px solid #4a6278;
    }

    /* ── Button Panel (right wall embedded) ───────────────── */
    #panel-section {
      width: 250px; flex-shrink: 0;
      background: linear-gradient(to left,
        #1a2530 0%, #2c3e50 15%, #2d3e50 100%);
      border-left: 3px solid #37474f;
      display: flex; flex-direction: column;
      padding: 10px 10px 10px 12px;
      gap: 8px; overflow: hidden;
    }

    /* Panel bezel */
    #panel-bezel {
      flex: 1; min-height: 0;
      background: linear-gradient(160deg, #263238 0%, #1c2833 100%);
      border: 3px solid #455a64;
      border-radius: 14px;
      padding: 12px 10px 10px;
      display: flex; flex-direction: column;
      gap: 8px;
      box-shadow:
        inset 0 2px 8px rgba(0,0,0,0.6),
        0 2px 6px rgba(0,0,0,0.4);
    }
    #panel-label {
      text-align: center;
      font-size: 11px; font-weight: 700;
      color: #546e7a; letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Floor Buttons — numbers only */
    #floor-buttons {
      flex: 1; min-height: 0;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      align-content: space-between;
    }
    .floor-btn {
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(
        circle at 38% 34%,
        #f0f0f0 0%, #d0d0d0 50%, #8a8a8a 100%
      );
      border: 3px solid #616161;
      box-shadow:
        3px 3px 10px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.6),
        inset 0 -1px 0 rgba(0,0,0,0.2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900;
      color: #1a1a1a;
      line-height: 1;
      letter-spacing: 0;
      transition: transform 0.1s, box-shadow 0.1s;
      touch-action: manipulation;
      user-select: none; -webkit-user-select: none;
    }
    /* G button slightly different to stand out */
    .floor-btn[data-id="G"] { font-size: 26px; color: #0d47a1; }

    .floor-btn:active {
      transform: scale(0.88);
      box-shadow: 1px 1px 4px rgba(0,0,0,0.6),
        inset 0 3px 6px rgba(0,0,0,0.35);
    }
    /* Lit (after pressing correct) */
    .floor-btn.lit {
      background: radial-gradient(
        circle at 38% 34%,
        #fff9e0 0%, #ffd54f 50%, #ff8f00 100%
      );
      border-color: #ff8f00;
      box-shadow:
        0 0 18px rgba(255,143,0,0.9),
        3px 3px 10px rgba(0,0,0,0.5);
      color: #4a2600;
    }
    /* Hint (wrong × 2) */
    .floor-btn.hint {
      animation: hint-pulse 0.45s ease-in-out infinite alternate;
    }
    @keyframes hint-pulse {
      from {
        background: radial-gradient(circle at 38% 34%,
          #e8f5e9 0%, #66bb6a 50%, #2e7d32 100%);
        border-color: #4caf50;
        box-shadow: 0 0 10px rgba(76,175,80,0.5),
          3px 3px 10px rgba(0,0,0,0.5);
      }
      to {
        background: radial-gradient(circle at 38% 34%,
          #f1f8e9 0%, #9ccc65 50%, #558b2f 100%);
        border-color: #8bc34a;
        box-shadow: 0 0 28px rgba(76,175,80,0.95),
          3px 3px 10px rgba(0,0,0,0.5);
      }
    }
    .floor-btn.disabled { pointer-events: none; opacity: 0.45; }

    /* Door control buttons (decorative) */
    #door-ctrls {
      flex-shrink: 0;
      display: flex; gap: 6px;
    }
    .door-ctrl {
      flex: 1; height: 40px;
      background: #37474f; border: 2px solid #546e7a;
      border-radius: 8px; color: #78909c;
      font-size: 14px; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1px;
      touch-action: manipulation; transition: background 0.15s;
    }
    .door-ctrl:active { background: #455a64; }
    .door-ctrl span { font-size: 8px; color: #4a6278; font-weight: 700; letter-spacing: 1px; }

    /* ── Floor Strip ──────────────────────────────────────── */
    #floor-strip {
      flex-shrink: 0;
      height: 64px;
      background: linear-gradient(to bottom,
        #3d5166 0%, #2c3e50 30%, #1c2833 100%);
      border-top: 3px solid #37474f;
      position: relative;
      overflow: hidden;
    }
    /* Floor tile lines */
    #floor-strip::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0, transparent 80px,
        rgba(255,255,255,0.04) 80px, rgba(255,255,255,0.04) 82px
      );
    }
    /* Floor edge highlight */
    #floor-strip::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(to right,
        transparent, rgba(255,255,255,0.15), transparent);
    }

    /* ─── Celebration Overlay ────────────────────────────── */
    #celebration-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 800;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.28s;
    }
    #celebration-overlay.show { opacity: 1; pointer-events: auto; }
    #celebration-card {
      background: #fff; border-radius: 30px;
      padding: 40px 56px; text-align: center;
      border: 7px solid #FFD700;
      box-shadow: 0 24px 64px rgba(0,0,0,0.45);
      transform: scale(0);
    }
    #celebration-overlay.show #celebration-card {
      animation: cel-bounce 0.38s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    @keyframes cel-bounce {
      0%   { transform: scale(0.35); opacity: 0; }
      100% { transform: scale(1);    opacity: 1; }
    }
    #cel-emoji  { font-size: 76px; display: block; margin-bottom: 10px; }
    #cel-main   { font-size: 44px; font-weight: 900; color: #0d47a1; }
    #cel-sub    { font-size: 28px; font-weight: 700; color: #1565c0; margin-top: 6px; }

    /* ─── Confetti ───────────────────────────────────────── */
    .confetti {
      position: fixed; border-radius: 2px;
      pointer-events: none; z-index: 790;
      animation: cf-fall var(--dur,2s) ease-in var(--delay,0s) forwards;
    }
    @keyframes cf-fall {
      0%   { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) translateX(var(--drift,0px)) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- ─── Start Screen ─────────────────────────────────────── -->
  <div id="start-screen">
    <div id="start-logo">🏢</div>
    <div id="start-title">升降機遊戲</div>
    <div id="start-sub">學習香港樓層</div>
    <button id="start-btn">開始玩 ▶</button>
  </div>

  <!-- ─── Instruction Bar ──────────────────────────────────── -->
  <div id="instruction-bar">
    <div id="instruction-text">
      請去
      <span id="target-floor-badge">
        <span class="badge-label" id="badge-label">?</span>
        <span class="badge-zh"    id="badge-zh">?</span>
      </span>
    </div>
    <button id="replay-btn" aria-label="重播">🔊</button>
  </div>

  <!-- ═══ ELEVATOR INTERIOR (first-person view) ═══ -->
  <div id="elevator-interior">

    <!-- Ceiling with light -->
    <div id="ceiling">
      <div id="ceiling-light"></div>
    </div>

    <!-- Main interior: side walls + doors + button panel -->
    <div id="interior-main">

      <!-- Left wall strip -->
      <div id="wall-left"></div>

      <!-- Center: floor indicator + doors -->
      <div id="door-section">

        <!-- LCD indicator above doors -->
        <div id="floor-indicator">
          <div id="floor-display">G/F</div>
          <div id="direction-arrow">▲</div>
        </div>

        <!-- Door frame (with outside scene behind) -->
        <div id="door-frame">
          <!-- Outside corridor (revealed when doors open) -->
          <div id="door-outside">
            <div id="outside-floor-num">G</div>
            <div id="outside-floor-label">地下</div>
          </div>
          <!-- The two doors -->
          <div id="door-left"></div>
          <div id="door-right"></div>
        </div>

      </div>

      <!-- Right wall strip -->
      <div id="wall-right"></div>

      <!-- Button panel (right side) -->
      <div id="panel-section">
        <div id="panel-bezel">
          <div id="panel-label">選樓層</div>
          <div id="floor-buttons">
            <!-- Populated by JS — numbers only -->
          </div>
          <div id="door-ctrls">
            <button class="door-ctrl" tabindex="-1">◁▷<span>開門</span></button>
            <button class="door-ctrl" tabindex="-1">▷◁<span>關門</span></button>
          </div>
        </div>
      </div>

    </div>

    <!-- Floor strip -->
    <div id="floor-strip"></div>

  </div>

  <!-- ─── Celebration Overlay ──────────────────────────────── -->
  <div id="celebration-overlay">
    <div id="celebration-card">
      <span id="cel-emoji">🎉</span>
      <div id="cel-main">答啱喇！</div>
      <div id="cel-sub"></div>
    </div>
  </div>

<script>
/* ═══════════════════════════════════════════════════════
   FLOOR DATA — Hong Kong format, no 4/F
   btnNum = what appears on the button (number only)
═══════════════════════════════════════════════════════ */
const FLOORS = [
  { id: 'G',  label: 'G/F',  btnNum: 'G',  display: '地下', speech: '地下',  position: 0 },
  { id: '1',  label: '1/F',  btnNum: '1',  display: '一樓', speech: '一樓',  position: 1 },
  { id: '2',  label: '2/F',  btnNum: '2',  display: '二樓', speech: '二樓',  position: 2 },
  { id: '3',  label: '3/F',  btnNum: '3',  display: '三樓', speech: '三樓',  position: 3 },
  { id: '5',  label: '5/F',  btnNum: '5',  display: '五樓', speech: '五樓',  position: 4 },
  { id: '6',  label: '6/F',  btnNum: '6',  display: '六樓', speech: '六樓',  position: 5 },
  { id: '7',  label: '7/F',  btnNum: '7',  display: '七樓', speech: '七樓',  position: 6 },
  { id: '8',  label: '8/F',  btnNum: '8',  display: '八樓', speech: '八樓',  position: 7 },
  { id: '9',  label: '9/F',  btnNum: '9',  display: '九樓', speech: '九樓',  position: 8 },
  { id: '10', label: '10/F', btnNum: '10', display: '十樓', speech: '十樓',  position: 9 },
];

/* ═══════════════════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════════════════ */
const S = {
  IDLE:'idle', ANNOUNCING:'announcing', WAITING:'waiting',
  MOVING:'moving', DOOR_OPEN:'door_open',
  CELEBRATING:'celebrating', HINT:'hint',
};
let state       = S.IDLE;
let curFloor    = FLOORS[0];
let targetFloor = null;
let wrongCount  = 0;
let hintTimer   = null;

/* ═══════════════════════════════════════════════════════
   DOM
═══════════════════════════════════════════════════════ */
const $display     = document.getElementById('floor-display');
const $arrow       = document.getElementById('direction-arrow');
const $doorFrame   = document.getElementById('door-frame');
const $buttons     = document.getElementById('floor-buttons');
const $celOv       = document.getElementById('celebration-overlay');
const $celSub      = document.getElementById('cel-sub');
const $celEmoji    = document.getElementById('cel-emoji');
const $badgeLbl    = document.getElementById('badge-label');
const $badgeZh     = document.getElementById('badge-zh');
const $replay      = document.getElementById('replay-btn');
const $startScr    = document.getElementById('start-screen');
const $startBtn    = document.getElementById('start-btn');
const $outsideNum  = document.getElementById('outside-floor-num');
const $outsideLbl  = document.getElementById('outside-floor-label');

/* ═══════════════════════════════════════════════════════
   TTS — Cantonese zh-HK
═══════════════════════════════════════════════════════ */
function speak(text, onEnd) {
  if (!window.speechSynthesis) { onEnd?.(); return; }
  speechSynthesis.cancel();
  setTimeout(() => {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'zh-HK'; utt.rate = 0.80; utt.pitch = 1.05; utt.volume = 1;
    if (onEnd) utt.onend = () => onEnd();
    speechSynthesis.speak(utt);
  }, 110);
}

/* ═══════════════════════════════════════════════════════
   LCD INDICATOR
═══════════════════════════════════════════════════════ */
function setDisplay(label) { $display.textContent = label; }
function setArrow(dir) {
  if (dir === 'none') { $arrow.classList.remove('vis'); return; }
  $arrow.textContent = dir === 'up' ? '▲' : '▼';
  $arrow.classList.add('vis');
}

/* Outside scene update */
function setOutsideScene(floor) {
  $outsideNum.textContent = floor.btnNum;
  $outsideLbl.textContent = floor.display;
}

/* ═══════════════════════════════════════════════════════
   ELEVATOR ANIMATION
   — In first-person, we animate the LCD + arrow + door
   — No shaft car movement needed (we're inside!)
═══════════════════════════════════════════════════════ */
function moveElevator(toFloor, done) {
  state = S.MOVING;
  const fromPos = curFloor.position;
  const toPos   = toFloor.position;
  const steps   = Math.abs(toPos - fromPos);
  const dur     = Math.max(900, steps * 380);

  // ── Going up / going down announcement ──
  speak(toPos > fromPos ? '往上' : '往下');
  setArrow(toPos > fromPos ? 'up' : 'down');

  // Roll LCD through floors
  rollDisplay(fromPos, toPos, dur);

  // Simulate travel vibration on interior (optional CSS class)
  document.getElementById('elevator-interior').classList.add('moving');

  setTimeout(() => {
    document.getElementById('elevator-interior').classList.remove('moving');
    curFloor = toFloor;
    setArrow('none');
    setOutsideScene(toFloor);
    done?.();
  }, dur);
}

function rollDisplay(from, to, totalMs) {
  if (from === to) return;
  const dir = from < to ? 1 : -1;
  const steps = Math.abs(to - from);
  const ms = totalMs / steps;
  let i = 1;
  const iv = setInterval(() => {
    const pos = from + dir * i;
    const f = FLOORS.find(x => x.position === pos);
    if (f) setDisplay(f.label);
    i++;
    if (i > steps) clearInterval(iv);
  }, ms);
}

/* ═══════════════════════════════════════════════════════
   DOORS
═══════════════════════════════════════════════════════ */
function openDoors(done) {
  state = S.DOOR_OPEN;
  speak('升降機門開啟');                    // ── Door open announcement
  $doorFrame.classList.add('doors-open');
  setTimeout(() => done?.(), 680);
}

function closeDoors(done) {
  speak('升降機門關閉');                    // ── Door closing announcement
  $doorFrame.classList.remove('doors-open');
  setTimeout(() => done?.(), 680);
}

/* ═══════════════════════════════════════════════════════
   FLOOR BUTTONS — numbers only
═══════════════════════════════════════════════════════ */
function buildButtons() {
  [...FLOORS].reverse().forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'floor-btn';
    btn.dataset.id = f.id;
    btn.textContent = f.btnNum;          // ← NUMBER ONLY
    btn.addEventListener('click', () => onFloorBtn(f));
    $buttons.appendChild(btn);
  });
}

function setButtonsDisabled(yes) {
  document.querySelectorAll('.floor-btn')
    .forEach(b => b.classList.toggle('disabled', yes));
}
function resetButtons() {
  document.querySelectorAll('.floor-btn')
    .forEach(b => b.classList.remove('lit', 'hint', 'disabled'));
}

/* ═══════════════════════════════════════════════════════
   HINT
═══════════════════════════════════════════════════════ */
function showHint() {
  clearTimeout(hintTimer);
  const btn = document.querySelector(`.floor-btn[data-id="${targetFloor.id}"]`);
  if (!btn) return;
  btn.classList.add('hint');
  hintTimer = setTimeout(() => btn.classList.remove('hint'), 4000);
}

/* ═══════════════════════════════════════════════════════
   CELEBRATE
═══════════════════════════════════════════════════════ */
const EMOJIS    = ['🎉','🎊','⭐','🌟','🏆','🎈','✨','🥳'];
const CF_COLORS = [
  '#FFD700','#FF6B6B','#4ECDC4','#45B7D1',
  '#96CEB4','#FFEAA7','#ff8c00','#e91e63','#7c4dff'
];

function celebrate(floor) {
  state = S.CELEBRATING;
  fireConfetti(30);
  $celEmoji.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  $celSub.textContent   = `去${floor.display}！`;
  $celOv.classList.add('show');
  speak(`答啱喇！去${floor.speech}！`);

  setTimeout(() => {
    $celOv.classList.remove('show');
    clearConfetti();
    closeDoors(() => setTimeout(() => startRound(), 900));
  }, 2700);
}

function fireConfetti(n) {
  for (let i = 0; i < n; i++) {
    const el   = document.createElement('div');
    const size = 8 + Math.random() * 10;
    el.className = 'confetti';
    el.style.cssText = [
      `width:${size}px`, `height:${size}px`,
      `left:${Math.random() * 100}vw`, `top:-20px`,
      `background:${CF_COLORS[Math.floor(Math.random() * CF_COLORS.length)]}`,
      `border-radius:${Math.random() > 0.45 ? '50%' : '2px'}`,
      `--dur:${1.4 + Math.random() * 1.0}s`,
      `--delay:${Math.random() * 0.65}s`,
      `--drift:${(Math.random() - 0.5) * 260}px`,
    ].join(';');
    document.body.appendChild(el);
  }
}
function clearConfetti() {
  document.querySelectorAll('.confetti').forEach(e => e.remove());
}

/* ═══════════════════════════════════════════════════════
   BUTTON HANDLER
═══════════════════════════════════════════════════════ */
function onFloorBtn(floor) {
  if (state !== S.WAITING) return;
  if (floor.id === curFloor.id) return;

  const btn = document.querySelector(`.floor-btn[data-id="${floor.id}"]`);

  if (floor.id === targetFloor.id) {
    // ✅ Correct!
    btn.classList.add('lit');
    setButtonsDisabled(true);
    moveElevator(targetFloor, () => {
      // Arrival → announce → open doors → celebrate
      speak(`到達${targetFloor.speech}`, () => {
        openDoors(() => celebrate(targetFloor));
      });
    });
  } else {
    // ❌ Wrong — gentle feedback
    state = S.HINT;
    wrongCount++;
    btn.classList.add('lit');
    const msg = wrongCount === 1 ? '唔係呀，再試下' : '唔係呀，試下另一個';
    speak(msg);
    setTimeout(() => {
      btn.classList.remove('lit');
      if (wrongCount >= 2) showHint();
      state = S.WAITING;
    }, 1700);
  }
}

/* ═══════════════════════════════════════════════════════
   ROUND CONTROL
═══════════════════════════════════════════════════════ */
function startRound() {
  state = S.ANNOUNCING;
  wrongCount = 0;
  clearTimeout(hintTimer);

  let pick;
  do { pick = FLOORS[Math.floor(Math.random() * FLOORS.length)]; }
  while (pick.id === curFloor.id);
  targetFloor = pick;

  $badgeLbl.textContent = targetFloor.label;
  $badgeZh.textContent  = targetFloor.display;

  resetButtons();

  speak(`請去${targetFloor.speech}`, () => { state = S.WAITING; });
}

/* ═══════════════════════════════════════════════════════
   REPLAY
═══════════════════════════════════════════════════════ */
$replay.addEventListener('click', () => {
  if (state === S.WAITING || state === S.HINT)
    speak(`請去${targetFloor.speech}`);
});

/* ═══════════════════════════════════════════════════════
   START
═══════════════════════════════════════════════════════ */
$startBtn.addEventListener('click', () => {
  const unlock = new SpeechSynthesisUtterance(' ');
  unlock.volume = 0;
  speechSynthesis.speak(unlock);

  $startScr.classList.add('hidden');
  setTimeout(() => {
    $startScr.style.display = 'none';
    // Initialise outside scene
    setOutsideScene(curFloor);
    startRound();
  }, 440);
});

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
function init() {
  buildButtons();
  setDisplay(curFloor.label);
  setOutsideScene(curFloor);
}

init();
</script>
</body>
</html>
